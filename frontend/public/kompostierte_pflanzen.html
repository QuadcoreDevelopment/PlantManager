<!DOCTYPE html>
<html lang="de">

	<head>
		<!-- commonHead -->

		<title>Plant Manager - Kompost</title>

		<!-- JS Code -->
		<script src="./js/kompostierte_pflanzen.mjs" type="module"></script>

	</head>

	<body>
		<!-- nav -->

		<main class="container-lg">
			
			<!-- Ab hier Inhalt -->

			<div class="row row-cols-1 row-cols-lg-2 g-3">
				
				<div class="col col-12 col-lg-8">
					
					<ul class="list-group" id="plants">

						<!-- Generated Content goes here -->

						<li class="list-group-item">
							<div class="row">
								<div class="col col-auto pe-1 my-auto">
									<div class="spinner-border spinner-border-sm" role="status">
										<span class="visually-hidden">Loading...</span>
									</div>
								</div>
								<div class="col">
									Lade Pflanzen...
								</div>
							</div>
						</li>
						
					</ul>

				</div>

				<div class="col col-12 col-lg-4">
					<div class="card">
						<div class="card-body">

							<h2 class="card-title"><i class="bi bi-recycle"></i> Kompost</h2>
							
							<p class="card-text">
								Die hier aufgeführten Pflanzen wurden von dir auf den Kompost geworfen. 
								Du kannst Sie entweder endgültig löschen oder wiederherstellen.
							</p>

							<button type="button" id="restore-button" class="btn btn-primary w-100 mb-2"><i class="bi bi-arrow-clockwise"></i> Pflanzen wiederherstellen</button>
							<button type="button" id="delete-button" class="btn btn-danger w-100 mb-2"><i class="bi bi-trash-fill"></i> Pflanzen endgültig löschen</button>
						</div>
					</div>
				</div>

			</div>

			<br/>
			<!-- Bis hier Inhalt -->
		
		</main>

		<!-- bottomScripts -->
	</body>
</html>
