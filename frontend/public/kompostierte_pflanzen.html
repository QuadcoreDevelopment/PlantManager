	<body>
		<nav class="navbar sticky-top bg-primary navbar-expand-sm" data-bs-theme="dark"> 
			<div class="container-fluid">

				<a class="navbar-brand" href="index.html">
					<img src="./images/logo_light.svg" alt="Logo" width="40" height="40" class="d-inline-block align-text-top">
				</a>

				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
						<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav">
						<li class="nav-item">
							<a class="nav-link" aria-current="page" href="index.html">Dashboard</a>
						</li>

							<a class="nav-link" href="meine_pflanzen.html">Meine Pflanzen</a>
						</li>
					</ul>
				</div>
				
			</div>

		<main class="container-lg">
			
			<!-- Ab hier Inhalt -->

			<div id="plants" class="row row-cols-1 row-cols-lg-2 g-3">
				
				<div class="col col-12 col-lg-8">
					
					<ul class="list-group" id="plants">

						<!-- Generated Content goes here -->

						<li class="list-group-item">
							<div class="row">
								<div class="col col-auto pe-1 my-auto">
									<div class="spinner-border text-primary" role="status">
										<span class="visually-hidden">Loading...</span>
									</div>
								</div>
								<div class="col">
									<h4>Lade Pflanzen...</h4>
								</div>
							</div>
						</li>
						
					</ul>

				</div>

				<div class="col col-12 col-lg-4">
					<div class="card">
						<div class="card-body">

							<h2 class="card-title"><i class="bi bi-recycle"></i> Kompost</h2>
							
							<p class="card-text">
								Die hier aufgeführten Pflanzen wurden von dir auf den Kompost geworfen. 
								Du kannst Sie entweder endgültig löschen oder wiederherstellen.
							</p>

							<button type="button" class="btn btn-primary w-100 mb-2"><i class="bi bi-arrow-clockwise"></i> Pflanzen wiederherstellen</button>
							<button type="button" class="btn btn-danger w-100 mb-2"><i class="bi bi-trash-fill"></i> Pflanzen endgültig löschen</button>
						
						</div>
					</div>
				</div>

			</div>

			<br/>
			<!-- Bis hier Inhalt -->
