<!DOCTYPE html>
<html lang="de">

	<head>
		<!-- commonHead -->

		<title>Plant Manager</title>

		<!-- JS Code -->
		<script src="./js/detailseite_pflanze.mjs" type="module"></script>

	</head>

	<body>
		<!-- nav -->

		<main class="container-lg">
			
			<!-- Ab hier Inhalt -->
				
			<div class="card mb-4" id="plant-details">
				<div class="row g-0">
					<div class="col-md-5 col-lg-4">
						<img id="plant-image" src="./images/placeholder.svg" style="max-height: 40rem;" class="img-fluid rounded-start h-100 w-100 object-fit-cover bg-secondary" alt="...">
					</div>
					<div class="col-12 col-md-7 col-lg-8">
						<div class="card-body h-100 d-flex flex-column">

							<button class="btn btn-delete-plant text-red-hover position-absolute top-0 end-0 p-2 m-2" id="compost-button">
								<i class="bi bi-recycle"></i>
							</button>

							<h3 class="card-title" id="plant-name">
								<div class="spinner-border text-primary" role="status">
									<span class="visually-hidden">Loading...</span>
								</div>
								Lade Pflanze
							</h3>
							
							<p class=" mb-3 fs-5" id="species-name">-</p>

							<ul class="list-group list-group-horizontal-md mb-2">
								<li class="col list-group-item">
									<div class="row">
										<div class="col-auto pe-0">
											<i class="bi text-primary bi-plus-circle-fill fs-3"></i>
										</div>
										<div class="col">
											<p class="text-body-secondary m-0" style="font-size: 10pt;">Hinzugefügt</p>
											<p class="m-0">am <span id="added-date">-</span></p>
										</div>
									</div>
								</li>
								<li class="col list-group-item">
									<div class="row">
										<div class="col-auto pe-0">
											<i class="bi text-repot bi-trash2-fill fs-3"></i>
										</div>
										<div class="col">
											<p class="text-body-secondary m-0" style="font-size: 10pt;">Umgetopft</p>
											<p class="m-0"><span id="repotted-date">-</span></p>
										</div>
									</div>
								</li>
							</ul>
							<ul class="list-group list-group-horizontal-xl mb-3">
								<li class="col list-group-item">
									<div class="row">
										<div class="col-auto pe-0">
											<i class="bi bi-thermometer-sun fs-3 text-tmp_warm"></i>
										</div>
										<div class="col">
											<p class="text-body-secondary m-0" style="font-size: 10pt;">An warmen Tagen</p>
											<p class="m-0">Alle <span id="watering-interval-warm">-</span> Tage gießen</p>
										</div>
									</div>
								</li>
								<li class="col list-group-item">
									<div class="row">
										<div class="col-auto pe-0">
											<i class="bi bi-thermometer-half fs-3 text-tmp_normal"></i>
										</div>
										<div class="col">
											<p class="text-body-secondary m-0" style="font-size: 10pt;">An normalen Tagen</p>
											<p class="m-0">Alle <span id="watering-interval">-</span> Tage gießen</p>
										</div>
									</div>
								</li>
								<li class="col list-group-item">
									<div class="row">
										<div class="col-auto pe-0">
											<i class="bi bi-thermometer-snow fs-3 text-tmp_cold"></i>
										</div>
										<div class="col">
											<p class="text-body-secondary m-0" style="font-size: 10pt;">An kalten Tagen</p>
											<p class="m-0">Alle <span id="watering-interval-cold">-</span> Tage gießen</p>
										</div>
									</div>
								</li>
							</ul>
							
							<div class="row justify-content-start mt-auto">

								<div class="col-12 col-sm-4">
									<button id="edit-button" class="btn btn-primary w-100 mb-2">
										<i class="bi bi-pencil-fill" style="color: white;"></i><br/> 
										Bearbeiten
									</button>
								</div>
								<div class="col-6 col-sm-4">
									<button class="btn btn-water w-100 mb-2" id="water-button">
										<i class="bi bi-droplet-fill" style="color: white;"></i><br/> 
										Gießen
									</button>
								</div>
								<div class="col-6 col-sm-4">
									<button class="btn btn-repot w-100 mb-2" id="repot-button">
										<i class="bi bi-trash2-fill" style="color: white;"></i><br/> 
										Umtopfen
									</button>
								</div>
							</div>

						</div>
					</div>
				</div>	
			</div>

			<div id="activityContainer">
				<!--This empty div is automatically filled with activities fetched from the backend-->
			</div>

			<a href="meine_pflanzen.html" class="btn btn-primary mt-3 mb-3">
				<i class="bi bi-caret-left-fill" style="color: white;"></i> 
				Zurück zu meinen Pflanzen
			</a>
			
			<!-- Bis hier Inhalt -->
		</main>

		<!-- bottomScripts -->
	</body>
</html>
