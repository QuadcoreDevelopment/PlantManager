<!DOCTYPE html>
<html lang="de">

	<head>
		<!-- commonHead -->

		<title>Plant Manager - Pflanze bearbeiten</title>

		<!-- JS Code -->
		<script src="./js/pflanze_bearbeiten.mjs" type="module"></script>
	</head>

	<body>
		<!-- nav -->

		<main class="container-lg">
			
			<!-- Ab hier Inhalt -->
			<div class="row">
				<div class="col-auto">
					<div class="card mb-3">
						<img style="min-height: 10rem; max-height: 30rem;" class="card-img-top h-100 object-fit-cover bg-secondary" alt="..." id="image">
						<div class="card-body">
							<form id="uploadForm" enctype="multipart/form-data" method="put">
								<div class="input-group">
									<input class="form-control" type="file" id="picture" name="picture" accept="image/*">
									<input type="hidden" id="plant_id" name="plant_id" readonly> <!--Musst be set to the correct id!-->
									<button class="btn btn-primary" id="uploadButton" type="submit">
										<span id="uploadIcon"><i class="bi bi-upload"></i></span>
										<span id="uploadSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
									</button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
			
			
			<div class="card mb-3">
				<form class="card-body" id="detailForm">
					<div class="mb-3 row">
						<label for="name" class="col-sm-3 col-form-label"><i class="bi bi-tag"></i> Name:</label>
						<div class="col-sm-9">
							<input type="text" class="form-control" id="name" required>
						</div>
					</div>
					<div class="mb-3 row">
						<label for="inputSpecies" class="col-sm-3 col-form-label"><i class="bi bi-journal-bookmark"></i> Pflanzenart:</label>
						<div class="col-sm-9">
							<input type="text" class="form-control" id="inputSpecies" required>
						</div>
					</div>
					<div class="row">
						<label for="interval" class="col-sm-3 col-form-label"><i class="bi bi-clock-history"></i> Gießintervall:</label>
						<div class="col-sm-9 row pe-0">
							<div class="col-12 col-md-4 pe-0 mb-3">
							<div class="input-group">
								<span class="input-group-text bg-tmp_normal"><i class="bi bi-thermometer-half"></i></span>
								<input type="number" min="1" max="31" class="form-control" id="interval_normal">
							</div>
							</div>
							<div class="col-6 col-md-4 pe-0 mb-3 order-md-first">
							<div class="input-group">
								<span class="input-group-text bg-tmp_cold"><i class="bi bi-thermometer-snow"></i></span>
								<input type="number" min="1" max="31" class="form-control" id="interval_cold">
							</div>
							</div>
							<div class="col-6 col-md-4 mb-3 pe-0">
							<div class="input-group">
								<span class="input-group-text bg-tmp_warm"><i class="bi bi-thermometer-sun"></i></span>
								<input type="number" min="1" max="31" class="form-control" id="interval_warm">
							</div>
							</div>
						</div>
					</div>
					<div class="row justify-content-end">
						<div class="col-auto">
							<button class="btn btn-primary" type="submit" id="detailsSaveButton">
								<i class="bi bi-floppy" style="color: white;"></i> 
								Speichern
							</button>
						</div>
					</div>
				</form>
			</div>

			<!-- Bis hier Inhalt -->
		
		</main>

		<!-- bottomScripts -->
	</body>
</html>
